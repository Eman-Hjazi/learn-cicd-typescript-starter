name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies & Run migrations
        run: |
          npm ci
          npm run db:migrate

      - name: Build project
        run: npm run build

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Build and Push to Artifact Registry'
        run: |
          gcloud builds submit --tag europe-west4-docker.pkg.dev/qwiklabs-gcp-01-b0e586756a1e/notely-ar-repo/notely:latest .

      - name: 'Deploy to Cloud Run'
        run: |
          gcloud run deploy notely \
            --image europe-west4-docker.pkg.dev/qwiklabs-gcp-01-b0e586756a1e/notely-ar-repo/notely:latest \
            --region europe-west4 \
            --allow-unauthenticated \
            --project qwiklabs-gcp-01-b0e586756a1e \
            --max-instances=4 \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }}
